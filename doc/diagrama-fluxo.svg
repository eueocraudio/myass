<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="Liberation Sans, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#2a5d8a"/>
    </marker>
  </defs>

  <text x="30" y="26" font-size="13" font-weight="bold" fill="#1f3a5f">A receita (workflow)</text>

  <!-- vertical column of nassi blocks -->
  <rect x="40" y="40" width="300" height="34" rx="5" fill="#eef2f7" stroke="#2a5d8a"/>
  <text x="190" y="62" text-anchor="middle" font-size="11.5" fill="#1a1a1a">Início</text>

  <rect x="40" y="84" width="300" height="34" rx="5" fill="#eef2f7" stroke="#2a5d8a"/>
  <text x="190" y="106" text-anchor="middle" font-size="11.5" fill="#1a1a1a">1. Baixar dados</text>

  <!-- decision -->
  <rect x="40" y="128" width="300" height="40" rx="5" fill="#e7eefb" stroke="#1f3a5f"/>
  <text x="190" y="146" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1a1a1a">2. Decisão: já existe?</text>
  <text x="190" y="161" text-anchor="middle" font-size="10.5" fill="#555">sim → pula  ·  não → continua</text>

  <!-- loop container -->
  <rect x="40" y="178" width="300" height="104" rx="5" fill="#fcf7ec" stroke="#d8a13a"/>
  <text x="190" y="197" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#8a6516">3. Para cada item — em paralelo</text>
  <rect x="58" y="208" width="84" height="58" rx="4" fill="#fff" stroke="#d8a13a"/>
  <text x="100" y="241" text-anchor="middle" font-size="10.5" fill="#5a4a1f">item 1</text>
  <rect x="148" y="208" width="84" height="58" rx="4" fill="#fff" stroke="#d8a13a"/>
  <text x="190" y="241" text-anchor="middle" font-size="10.5" fill="#5a4a1f">item 2</text>
  <rect x="238" y="208" width="84" height="58" rx="4" fill="#fff" stroke="#d8a13a"/>
  <text x="280" y="241" text-anchor="middle" font-size="10.5" fill="#5a4a1f">item 3…</text>

  <rect x="40" y="292" width="300" height="34" rx="5" fill="#eef2f7" stroke="#2a5d8a"/>
  <text x="190" y="314" text-anchor="middle" font-size="11.5" fill="#1a1a1a">4. Juntar tudo e responder</text>

  <!-- connectors -->
  <line x1="190" y1="74" x2="190" y2="84" stroke="#2a5d8a" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="190" y1="118" x2="190" y2="128" stroke="#2a5d8a" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="190" y1="168" x2="190" y2="178" stroke="#2a5d8a" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="190" y1="282" x2="190" y2="292" stroke="#2a5d8a" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- big arrow to execution -->
  <line x1="350" y1="180" x2="410" y2="180" stroke="#2a5d8a" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- execution panel -->
  <rect x="420" y="60" width="270" height="240" rx="8" fill="#f6f9fc" stroke="#1f3a5f"/>
  <text x="555" y="86" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1f3a5f">A execução (uma "ocorrência")</text>
  <text x="440" y="118" font-size="11" fill="#333">O gerente segue a receita</text>
  <text x="440" y="138" font-size="11" fill="#333">passo a passo:</text>
  <text x="440" y="166" font-size="11" fill="#333">• manda cada passo para um</text>
  <text x="452" y="183" font-size="11" fill="#333">Bloco trabalhador;</text>
  <text x="440" y="208" font-size="11" fill="#333">• espera o resultado voltar;</text>
  <text x="440" y="233" font-size="11" fill="#333">• avança para o próximo passo;</text>
  <text x="440" y="258" font-size="11" fill="#333">• no fim, devolve a resposta.</text>
  <text x="440" y="286" font-size="10.5" fill="#666">Vários trabalhos rodam ao</text>
</svg>
