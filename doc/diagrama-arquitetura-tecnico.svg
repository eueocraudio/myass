<svg xmlns="http://www.w3.org/2000/svg" width="900" height="950" viewBox="0 0 900 950" font-family="Liberation Sans, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#2a5d8a"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M7,0 L0,3 L7,6 z" fill="#2a5d8a"/>
    </marker>
  </defs>

  <text x="30" y="26" font-size="16" font-weight="bold" fill="#1f3a5f">myass — arquitetura (Filosofia Borg: a Rainha escondida)</text>
  <text x="30" y="46" font-size="11.5" fill="#555">Tudo isto é um QUADRANTE. Podem coexistir muitos quadrantes, que se comunicam por um mecanismo a definir.</text>

  <!-- ===================== QUADRANTE 1 FRAME ===================== -->
  <rect x="12" y="56" width="876" height="712" rx="14" fill="#fbfcfe" stroke="#1f3a5f" stroke-width="2.5"/>
  <text x="30" y="76" font-size="14" font-weight="bold" fill="#1f3a5f">QUADRANTE 1</text>

  <!-- ============ WAN ZONE ============ -->
  <text x="30" y="102" font-size="12" font-weight="bold" fill="#a07d1f">WAN (Internet) — adversário: nação-estado</text>

  <!-- Locutus -->
  <rect x="300" y="112" width="300" height="64" rx="8" fill="#f2f2f2" stroke="#888" stroke-width="1.4"/>
  <text x="450" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">LOCUTUS — armazém público</text>
  <text x="450" y="152" text-anchor="middle" font-size="11" fill="#666">porta-voz CEGO da Rainha</text>
  <text x="450" y="168" text-anchor="middle" font-size="10.5" fill="#999">guarda só ciphertext opaco · nunca decifra</text>

  <!-- divider WAN / Tor -->
  <line x1="24" y1="194" x2="876" y2="194" stroke="#c9a23a" stroke-width="1.5" stroke-dasharray="7 5"/>

  <!-- ============ TOR LAYER ============ -->
  <rect x="24" y="204" width="852" height="78" rx="10" fill="#f3eef7" stroke="#7a4fa0" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="42" y="226" font-size="12" font-weight="bold" fill="#7a4fa0">CANAL SUB-ESPACIAL — rede Tor (onion routing)</text>
  <text x="42" y="246" font-size="10.5" fill="#6b4a85">Scheduler = serviço onion v3 (sem IP/porta pública) · client-auth: só drones provisionados alcançam o rendezvous</text>
  <text x="42" y="264" font-size="10.5" fill="#6b4a85">bridges + obfs4/meek se o Estado bloquear Tor · GET/SET também devem sair por Tor (recomendado)</text>

  <!-- inside-out arrows (core <-> Locutus) through Tor -->
  <line x1="410" y1="176" x2="410" y2="306" stroke="#2a5d8a" stroke-width="1.8" marker-end="url(#arrB)"/>
  <text x="318" y="194" font-size="10" fill="#2a5d8a">GET puxa (pull)</text>
  <line x1="490" y1="306" x2="490" y2="176" stroke="#2a5d8a" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="500" y="194" font-size="10" fill="#2a5d8a">SET empurra (push)</text>

  <!-- ============ TRUSTED CORE ============ -->
  <rect x="40" y="294" width="820" height="210" rx="12" fill="#f6f9fc" stroke="#1f3a5f" stroke-width="1.8"/>
  <text x="58" y="318" font-size="13" font-weight="bold" fill="#1f3a5f">NÚCLEO CONFIÁVEL (rede fechada) — nunca aceita conexão de entrada</text>

  <!-- GET / SET edge -->
  <rect x="64" y="330" width="118" height="40" rx="6" fill="#eef2f7" stroke="#2a5d8a"/>
  <text x="123" y="354" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">GET</text>
  <rect x="64" y="378" width="118" height="40" rx="6" fill="#eef2f7" stroke="#2a5d8a"/>
  <text x="123" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">SET</text>
  <text x="123" y="436" text-anchor="middle" font-size="10" fill="#666">borda · decifra só aqui</text>

  <!-- RAINHA box (Broker + Scheduler + Mongo) -->
  <rect x="208" y="334" width="624" height="150" rx="10" fill="#eaf0e9" stroke="#3a6b34" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="224" y="354" font-size="12.5" font-weight="bold" fill="#2c5527">A RAINHA (escondida, não cega) = Broker + Scheduler</text>

  <!-- Broker -->
  <rect x="226" y="366" width="180" height="98" rx="6" fill="#eef2f7" stroke="#2a5d8a"/>
  <text x="316" y="388" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">BROKER (Python)</text>
  <text x="316" y="406" text-anchor="middle" font-size="10" fill="#444">N1: lista de nós por classe</text>
  <text x="316" y="421" text-anchor="middle" font-size="10" fill="#444">(MEM × CPU)</text>
  <text x="316" y="438" text-anchor="middle" font-size="10" fill="#444">N2: ring buffer W/R por nó</text>
  <text x="316" y="454" text-anchor="middle" font-size="10" fill="#444">janela em memória sobre Mongo</text>

  <!-- MongoDB -->
  <rect x="424" y="366" width="150" height="98" rx="6" fill="#eef2f7" stroke="#2a5d8a"/>
  <text x="499" y="394" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">MongoDB</text>
  <text x="499" y="414" text-anchor="middle" font-size="10" fill="#444">backlog durável</text>
  <text x="499" y="430" text-anchor="middle" font-size="10" fill="#444">replica set</text>
  <text x="499" y="446" text-anchor="middle" font-size="10" fill="#444">(sem SPOF)</text>

  <!-- Scheduler -->
  <rect x="592" y="366" width="222" height="98" rx="6" fill="#dfe9f4" stroke="#1f3a5f" stroke-width="1.5"/>
  <text x="703" y="388" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">SCHEDULER (Escalonador)</text>
  <text x="703" y="406" text-anchor="middle" font-size="10" fill="#444">dirige o encadeamento (ocorrências)</text>
  <text x="703" y="421" text-anchor="middle" font-size="10" fill="#444">casa perfil HW ↔ classe</text>
  <text x="703" y="436" text-anchor="middle" font-size="10" fill="#444">Inventory: block_hash → bot_refs</text>
  <text x="703" y="451" text-anchor="middle" font-size="10" fill="#444">audit log append-only (só aqui)</text>

  <!-- internal link note -->
  <text x="450" y="498" text-anchor="middle" font-size="10" fill="#3a6b34">elos internos: Noise NNpsk0 (PSK por par) · GET/SET ↔ Broker ↔ Mongo ↔ Scheduler</text>

  <!-- ============ EXPOSED LINK ============ -->
  <text x="450" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a4fa0">único elo exposto — Executor disca para o Scheduler · Noise_KKpsk0_25519_ChaChaPoly_BLAKE2s · sobre Tor</text>
  <line x1="703" y1="484" x2="703" y2="540" stroke="#2a5d8a" stroke-width="1.6"/>
  <line x1="160" y1="540" x2="780" y2="540" stroke="#7a4fa0" stroke-width="1.4" stroke-dasharray="5 4"/>

  <!-- ============ DRONES / BLOCKS ============ -->
  <g>
    <rect x="70" y="554" width="220" height="150" rx="8" fill="#fcf7ec" stroke="#d8a13a" stroke-width="1.4"/>
    <text x="180" y="578" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8a6516">BLOCK 1 (drone)</text>
    <text x="180" y="600" text-anchor="middle" font-size="10.5" fill="#5a4a1f">designação = BLAKE2(pubkey)</text>
    <text x="180" y="620" text-anchor="middle" font-size="11" fill="#5a4a1f">EXECUTOR</text>
    <text x="180" y="640" text-anchor="middle" font-size="10.5" fill="#5a4a1f">+ BOTs (projetos/scripts)</text>
    <text x="180" y="660" text-anchor="middle" font-size="10" fill="#7a6a3a">disca p/ fora · sem porta de escuta</text>
    <text x="180" y="678" text-anchor="middle" font-size="10" fill="#7a6a3a">verifica project_hash antes de rodar</text>
  </g>
  <g>
    <rect x="340" y="554" width="220" height="150" rx="8" fill="#fcf7ec" stroke="#d8a13a" stroke-width="1.4"/>
    <text x="450" y="578" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8a6516">BLOCK 2 (drone)</text>
    <text x="450" y="600" text-anchor="middle" font-size="10.5" fill="#5a4a1f">designação = BLAKE2(pubkey)</text>
    <text x="450" y="620" text-anchor="middle" font-size="11" fill="#5a4a1f">EXECUTOR</text>
    <text x="450" y="640" text-anchor="middle" font-size="10.5" fill="#5a4a1f">+ BOTs (projetos/scripts)</text>
    <text x="450" y="660" text-anchor="middle" font-size="10" fill="#7a6a3a">regeneração: lease/redelivery</text>
    <text x="450" y="678" text-anchor="middle" font-size="10" fill="#7a6a3a">bot_ref = {project_hash, script_hash}</text>
  </g>
  <g>
    <rect x="610" y="554" width="220" height="150" rx="8" fill="#fcf7ec" stroke="#d8a13a" stroke-width="1.4"/>
    <text x="720" y="578" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8a6516">BLOCK N (drone)</text>
    <text x="720" y="600" text-anchor="middle" font-size="10.5" fill="#5a4a1f">cliente Tor (IP oculto)</text>
    <text x="720" y="620" text-anchor="middle" font-size="11" fill="#5a4a1f">EXECUTOR</text>
    <text x="720" y="640" text-anchor="middle" font-size="10.5" fill="#5a4a1f">+ BOTs (projetos/scripts)</text>
    <text x="720" y="660" text-anchor="middle" font-size="10" fill="#7a6a3a">replique p/ escalar e tolerar falha</text>
    <text x="720" y="678" text-anchor="middle" font-size="10" fill="#7a6a3a">HELLO carrega perfil HW</text>
  </g>

  <!-- dial-out arrows -->
  <line x1="180" y1="554" x2="180" y2="542" stroke="#2a5d8a" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="450" y1="554" x2="450" y2="542" stroke="#2a5d8a" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="720" y1="554" x2="720" y2="542" stroke="#2a5d8a" stroke-width="1.6" marker-end="url(#arr)"/>

  <text x="450" y="732" text-anchor="middle" font-size="10.5" fill="#666">Três muros da Rainha: MASCARADA (Locutus cego) · ESCONDIDA (onion Tor) · DISTRIBUÍDA (replica set, sem SPOF)</text>
  <text x="450" y="750" text-anchor="middle" font-size="10" fill="#999">assimilação: chave X25519 cunhada no provisionamento, embarcada no payload (Rainha-parteira efêmera, air-gapped) · out-of-band (USB)</text>

  <!-- ===================== INTER-QUADRANTE: depósito cego entre Rainhas ===================== -->
  <text x="30" y="794" font-size="13" font-weight="bold" fill="#9a2f2f">SUBSPACE RELAY (inter-quadrante) — depósito CEGO de REQUEST/RESPONSE, E2E entre as Rainhas (plural) · bdd</text>

  <!-- link down from quadrante 1's Rainha -->
  <line x1="450" y1="768" x2="450" y2="812" stroke="#2a5d8a" stroke-width="1.8" marker-start="url(#arrB)" marker-end="url(#arr)"/>

  <!-- blind deposit service -->
  <rect x="312" y="812" width="276" height="86" rx="10" fill="#f2f2f2" stroke="#888" stroke-width="1.6"/>
  <text x="450" y="834" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#333">DEPÓSITO INTER-QUADRANTE (cego)</text>
  <text x="450" y="853" text-anchor="middle" font-size="11" fill="#555">REQUEST ▸           ◂ RESPONSE</text>
  <text x="450" y="870" text-anchor="middle" font-size="10" fill="#999">só ciphertext · nunca decifra</text>
  <text x="450" y="886" text-anchor="middle" font-size="10" fill="#999">pull sobre Tor · honra no-inbound</text>

  <!-- sibling quadrants pulling/pushing the same deposit -->
  <line x1="312" y1="855" x2="266" y2="855" stroke="#2a5d8a" stroke-width="1.6" marker-start="url(#arr)" marker-end="url(#arrB)"/>
  <line x1="588" y1="855" x2="634" y2="855" stroke="#2a5d8a" stroke-width="1.6" marker-start="url(#arrB)" marker-end="url(#arr)"/>

  <rect x="46" y="824" width="220" height="62" rx="10" fill="#fbfcfe" stroke="#1f3a5f" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="156" y="850" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f3a5f">QUADRANTE 3 … N</text>
  <text x="156" y="870" text-anchor="middle" font-size="10" fill="#5a6b80">(cada um: Rainha escondida)</text>

  <rect x="634" y="824" width="220" height="62" rx="10" fill="#fbfcfe" stroke="#1f3a5f" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="744" y="850" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f3a5f">QUADRANTE 2</text>
  <text x="744" y="870" text-anchor="middle" font-size="10" fill="#5a6b80">(Rainha escondida)</text>

  <text x="450" y="922" text-anchor="middle" font-size="10.5" fill="#9a2f2f">cripto E2E Rainha↔Rainha (DENTRO do blob bdd): X3DH — IK + SPK + OPK (X25519 / XEd25519 / BLAKE2s / ChaCha20-Poly1305) · PSK por par no KDF · auth mútua</text>
  <text x="450" y="940" text-anchor="middle" font-size="10.5" fill="#9a2f2f">FS assíncrona VERDADEIRA: a destinatária publica bundle de prekeys no bdd e APAGA o OPK após o uso · anti-replay por OPK consumido + contador/request_id</text>
</svg>
